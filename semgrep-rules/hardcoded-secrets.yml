rules:

# Detecta claves o secretos escritos directamente en el código
- id: fleetsec-hardcoded-secret

  languages:
    - python

  severity: ERROR

  message: |
    Hardcoded secret detected.
    Move secrets to environment variables.

  patterns:
    - pattern-either:
        - pattern: SECRET_KEY = "..."
        - pattern: PASSWORD = "..."
        - pattern: API_KEY = "..."
        - pattern: TOKEN = "..."

  metadata:
    category: security
    technology:
      - python
    confidence: HIGH
    impact: HIGH
    cwe:
      - "CWE-798"
    owasp:
      - "A02:2021-Cryptographic Failures"