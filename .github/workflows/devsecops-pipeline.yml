name: FleetSec DevSecOps Pipeline

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  security-analysis:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
    # Descargar el repositorio
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Instalar Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    # Instalar dependencias
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt

    # Ejecutar análisis estático con Semgrep
    - name: Run Semgrep Security Scan
      uses: returntocorp/semgrep-action@v1

      continue-on-error: true
      with:
        config: |
          p/security-audit
          ./semgrep-rules/
    - name: Run Gitleaks
# Ejecutar análisis con gitleaks y crear un reporte en formato SARIF (.json)
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/repo \
          zricethezav/gitleaks:latest detect \
          --source=/repo \
          --config=/repo/gitleaks.toml \
          --no-git \
          --report-format sarif \
          --report-path /repo/reports/gitleaks-report.sarif

      continue-on-error: true

      # Ejecutar análisis con SBOM (CycloneDX)
    - name: Generate SBOM (CycloneDX)

      run: |
        mkdir -p reports

        docker run --rm \
          -v ${{ github.workspace }}:/project \
          anchore/syft:latest \
          dir:/project \
          -o cyclonedx-json \
          > reports/sbom.json
      #y el analisis realizado con SBOM lo guarda en formato .json
    - name: Upload SBOM
      uses: actions/upload-artifact@v4

      with:
        name: sbom-report
        path: reports/sbom.json

# Ejecutar análisis con TRIVY y crear un reporte EN .JSON
    - name: Run Trivy Filesystem Scan

      run: |
        mkdir -p reports

        docker run --rm \
          -v ${{ github.workspace }}:/project \
          aquasec/trivy:latest \
          fs \
          --skip-dirs "app/.venv" \
          --format json \
          --output /project/reports/trivy-report.json \
          /project

      continue-on-error: true

    - name: Upload Trivy Report
      uses: actions/upload-artifact@v4

      with:
        name: trivy-report
        path: reports/trivy-report.json

#verificacion de que la imagen base no use :latest
    - name: Verify Base Image is Pinned
      run: |
        if grep -E "^FROM .*:latest" Dockerfile || grep -E "^FROM [a-zA-Z0-9./_-]+$" Dockerfile; then
          echo "❌ La imagen base usa :latest o no tiene tag."
          exit 1
        else
          echo "✅ Imagen base con tag pinneado."
        fi

    - name: Build FleetSec Image
      run: |
        docker build -t fleetsec .   

  #Trivy imagen
    - name: Run Trivy Image Scan
      run: |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v ${{ github.workspace }}:/project \
          aquasec/trivy:latest \
          image \
          --severity CRITICAL \
          --exit-code 1 \
          --format json \
          --output /project/reports/trivy-image.json \
          fleetsec

      continue-on-error: true

    - name: Upload Trivy Image Report
      uses: actions/upload-artifact@v4

      with:
        name: trivy-image-report
        path: reports/trivy-image.json

  #Creación de Issues automáticos
    - name: Create Issues from Trivy Report
      if: always()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ ! -f reports/trivy-image.json ]; then
          echo "No hay reporte de Trivy, se omite creación de issues."
          exit 0
        fi

        CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' reports/trivy-image.json)

        if [ "$CRITICAL_COUNT" -gt 0 ]; then
          gh label create "security" --color FF0000 --description "Security issue" 2>/dev/null || true
          gh label create "trivy" --color 1D76DB --description "Found by Trivy" 2>/dev/null || true
          gh label create "critical" --color B60205 --description "Critical severity" 2>/dev/null || true

          BODY=$(jq -r '
            [.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL") |
            "- **\(.VulnerabilityID)** en `\(.PkgName)` \(.InstalledVersion) → fix: \(.FixedVersion // "N/A")\n  \(.Title // "")"
            ] | join("\n")
          ' reports/trivy-image.json)

          gh issue create \
            --title "🚨 Trivy: $CRITICAL_COUNT vulnerabilidades CRITICAL en imagen fleetsec" \
            --body "$BODY" \
            --label "security,trivy,critical"
        else
          echo "Sin vulnerabilidades CRITICAL, no se crea issue."
        fi

  #conexion y automatizacion del reporte de zap
    - name: Start FleetSec API
      run: |
        docker run -d \
        --name fleetsec-api \
        -p 8082:8082 \
        fleetsec

    - name: Wait API
      run: |
        sleep 20

 #ejecuta zap
    - name: Run OWASP ZAP
      run: |
        mkdir -p reports
        chmod 777 reports
    
        docker run --rm \
        -u 0 \
        --network host \
        -v ${{ github.workspace }}/reports:/zap/wrk \
        -v ${{ github.workspace }}/docker/zap:/zap/config \
        ghcr.io/zaproxy/zaproxy:stable \
        zap.sh \
        -cmd \
        -autorun /zap/config/zap.yaml

      continue-on-error: true

      #genera el reporte de zap en formato .html
    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: reports/zap-report.html

    # Verificar instalación
    - name: Verify Environment
      run: |
        python --version
        pip --version
        pip list