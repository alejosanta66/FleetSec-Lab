name: FleetSec DevSecOps Pipeline

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  security-analysis:
    runs-on: ubuntu-latest

    steps:
    # Descargar el repositorio
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Instalar Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    # Instalar dependencias
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt

    # Ejecutar análisis estático con Semgrep
    - name: Run Semgrep Security Scan
      uses: returntocorp/semgrep-action@v1

      continue-on-error: true
      with:
        config: |
          p/security-audit
          ./semgrep-rules/
    - name: Run Gitleaks
# Ejecutar análisis con gitleaks y crear un reporte en formato SARIF (.json)
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/repo \
          zricethezav/gitleaks:latest detect \
          --source=/repo \
          --config=/repo/gitleaks.toml \
          --no-git \
          --report-format sarif \
          --report-path /repo/reports/gitleaks-report.sarif

      continue-on-error: true

      # Ejecutar análisis con SBOM (CycloneDX)
    - name: Generate SBOM (CycloneDX)

      run: |
        mkdir -p reports

        docker run --rm \
          -v ${{ github.workspace }}:/project \
          anchore/syft:latest \
          dir:/project \
          -o cyclonedx-json \
          > reports/sbom.json
      #y el analisis realizado con SBOM lo guarda en formato .json
    - name: Upload SBOM
      uses: actions/upload-artifact@v4

      with:
        name: sbom-report
        path: reports/sbom.json

# Ejecutar análisis con TRIVY y crear un reporte EN .JSON
    - name: Run Trivy Filesystem Scan

      run: |
        mkdir -p reports

        docker run --rm \
          -v ${{ github.workspace }}:/project \
          aquasec/trivy:latest \
          fs \
          --skip-dirs "app/.venv" \
          --format json \
          --output /project/reports/trivy-report.json \
          /project

      continue-on-error: true

    - name: Upload Trivy Report
      uses: actions/upload-artifact@v4

      with:
        name: trivy-report
        path: reports/trivy-report.json

  #conexion y automatizacion del reporte de zap
    - name: Start FleetSec API
      run: |
        docker build -t fleetsec .

        docker run -d \
        --name fleetsec-api \
        -p 8082:8082 \
        fleetsec

    - name: Wait API
      run: |
        sleep 20

        #ejecuta zap
    - name: Run OWASP ZAP
      run: |
        mkdir -p reports
        chmod 777 reports
    
        docker run --rm \
        -u 0 \
        --network host \
        -v ${{ github.workspace }}/reports:/zap/wrk \
        -v ${{ github.workspace }}/docker/zap:/zap/config \
        ghcr.io/zaproxy/zaproxy:stable \
        zap.sh \
        -cmd \
        -autorun /zap/config/zap.yaml

      continue-on-error: true

      #genera el reporte de zap en formato .html
    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: reports/zap-report.html

    # Verificar instalación
    - name: Verify Environment
      run: |
        python --version
        pip --version
        pip list